<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{MENU_NAME}} [{{MENU_CODE_UP}}]</title>
<link rel="stylesheet" href="../common/wms-ui.css">
<style>
{{CUSTOM_CSS}}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- ── 헤더 ── -->
  <div class="page-header">
    <div class="page-title">
      <strong>{{MENU_NAME}}</strong>
      <span class="arrow">∨</span>
    </div>
    <button class="btn-search" onclick="doSearch()">검색</button>
    <button class="btn-search" onclick="doReset()">초기화</button>
    <button class="btn-search" onclick="openRule()" style="margin-left:auto">업무규칙</button>
  </div>

  <!-- ── 검색 영역 ── -->
  <div class="search-area">
    <table>
      <colgroup>
        <col style="width:82px"><col>
        <col style="width:82px"><col>
        <col style="width:82px"><col>
        <col style="width:82px"><col>
        <col style="width:82px"><col>
      </colgroup>
      <tbody>
        {{SEARCH_ROWS}}
      </tbody>
    </table>
  </div>

  <!-- ── 메인 영역 (UI유형별 패널 배치) ── -->
  {{MAIN_AREA}}

</div><!-- /page-wrap -->

<!-- ── 등록/수정·전용 팝업 ── -->
{{REG_POPUPS}}

<!-- ── 업무규칙 모달 ── -->
<div class="modal-bg" id="ruleModal">
  <div class="modal" style="width:520px">
    <div class="modal-header" id="ruleHeader">
      <span>업무규칙</span>
      <button class="close-btn" onclick="closeRule()">✕</button>
    </div>
    <div class="modal-body">
      <p class="rule-title">화면구성</p>
      {{RULE_TABLE}}
      <p class="rule-title">업무규칙</p>
      <ol class="rule-list">
        {{RULE_LIST}}
      </ol>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-close" onclick="closeRule()">닫 기</button>
    </div>
  </div>
</div>

<!-- 공통 헬퍼 (openCpPopup / openPdPopup / centerModal / initModalDrag / renderPagination …) -->
<script src="../common/wms-common.js"></script>

<!-- 화면별 테스트 데이터 -->
<script src="./mock-data.js"></script>

<!-- 화면별 스크립트 -->
<script>
{{SCRIPT_BODY}}

/* 모달 드래그 초기화 (각 모달별로 initModalDrag('xxxModal', 'xxxHeader') 호출) */
initModalDrag('ruleModal', 'ruleHeader');
</script>

</body>
</html>
