<!--
  wireframe-only | OBRQ01 | 배송요청 목록 | Type A (목록형) | ow5000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배송요청 목록 [OBRQ01]</title>
<link rel="stylesheet" href="../_common-m/mobile.css">
</head>
<body>
<div class="pda-wrap">

  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">배송요청</div>
    <div class="header-right"></div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../_common-m/assets/icon-search.png" alt="검색"></span>
      <input type="text" id="searchInput" placeholder="배송번호 스캔 및 입력" oninput="renderCards()">
      <button class="search-act-btn" onclick="alert('[스캔]\n바코드 스캐너를 실행합니다.')"><img src="../_common-m/assets/icon-schBarcode.png" alt="바코드"></button>
      <button class="search-act-btn" onclick="openFilter()"><img src="../_common-m/assets/icon-filter.png" alt="필터"></button>
    </div>
  </div>

  <main class="pda-content">
    <div class="card-list" id="cardList"></div>
  </main>

  <nav class="tab-bar">
    <button class="tab-item" onclick="location.href='../_common-m/main.html'">
      <img src="../_common-m/assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item" onclick="location.href='../ivmv01m/ivmv01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item on">
      <img src="../_common-m/assets/icon-footer01.png" alt="출고">
    </button>
    <button class="tab-item" onclick="location.href='../strg01m/strg01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item" onclick="location.href='../_common-m/menu.html'">
      <img src="../_common-m/assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>

<div class="filter-overlay" id="filterOverlay" onclick="closeFilter()"></div>
<div class="filter-sheet" id="filterSheet">
  <div class="filter-hdr">
    <span class="filter-ttl">배송 검색</span>
    <button class="filter-close-btn" onclick="closeFilter()">✕</button>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">사업장</div>
    <select class="pda-sel"><option>메가랩</option><option>부산센터</option></select>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">배송유형</div>
    <div class="chip-wrap" id="typeChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="일반배송">일반배송</button>
      <button class="chip" data-v="새벽배송">새벽배송</button>
      <button class="chip" data-v="급송">급송</button>
    </div>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">진행상태</div>
    <div class="chip-wrap" id="stsChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="00">대기</button>
      <button class="chip" data-v="17">준비</button>
      <button class="chip" data-v="55">처리중</button>
      <button class="chip" data-v="77">확정</button>
      <button class="chip" data-v="99">취소</button>
    </div>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">배송예정일</div>
    <div class="date-rng">
      <input class="pda-date" type="date" value="2024-11-01">
      <span class="tilde">~</span>
      <input class="pda-date" type="date" value="2024-11-30">
    </div>
  </div>
  <div class="filter-ftr">
    <button class="pda-btn btn-gray" onclick="resetFilter()">초기화</button>
    <button class="pda-btn btn-blue" onclick="applyFilter()">검색</button>
  </div>
</div>

<script src="./obrq01m-mock-data.js"></script>
<script>
var activeType = '', activeSts = '';

function renderCards() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var data = OBRQ01_DATA.filter(function(d) {
    return (!q || d.no.toLowerCase().includes(q) || d.cust.toLowerCase().includes(q) || d.dest.includes(q))
        && (!activeType || d.type === activeType)
        && (!activeSts  || d.sts  === activeSts);
  });
  var html = '';
  if (!data.length) { html = '<div class="empty-msg">조회된 데이터가 없습니다.</div>'; }
  else data.forEach(function(d) {
    html += '<div class="card-row" onclick="location.href=\'./OWPC01.html\'">'
      + '<div class="card-sts sts-' + d.sts + '">' + d.stsNm + '</div>'
      + '<div class="card-body">'
      +   '<div class="card-tags"><span class="c-tag">'+ d.site +'</span><span class="c-tag">'+ d.type +'</span></div>'
      +   '<div class="card-r1"><span>'+ d.no +'</span><span>'+ d.date +'</span></div>'
      +   '<div class="card-r2"><span style="font-size:14px;font-weight:normal;color:#555">'+ d.dest +'</span></div>'
      +   '<div class="card-r2" style="margin-top:4px"><span>'+ d.cust +'</span><span class="card-cnt">'+ d.cnt +'건 ›</span></div>'
      + '</div></div>';
  });
  document.getElementById('cardList').innerHTML = html;
}

function openFilter() { document.getElementById('filterOverlay').classList.add('show'); document.getElementById('filterSheet').classList.add('show'); }
function closeFilter() { document.getElementById('filterOverlay').classList.remove('show'); document.getElementById('filterSheet').classList.remove('show'); }
function applyFilter() { closeFilter(); renderCards(); }
function resetFilter() { activeType=''; activeSts=''; document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on', c.dataset.v==='');}); }

function setupChips(id, fn) {
  document.getElementById(id).addEventListener('click', function(e) {
    var b = e.target.closest('.chip'); if (!b) return;
    this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
    b.classList.add('on'); fn(b.dataset.v);
  });
}

window.addEventListener('DOMContentLoaded', function() {
  setupChips('typeChips', function(v){ activeType=v; });
  setupChips('stsChips',  function(v){ activeSts=v;  });
  renderCards();
});
</script>
</body>
</html>
