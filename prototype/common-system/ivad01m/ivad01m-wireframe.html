<!--
  wireframe-only | IVAD01 | 입고처리(적하) | Type B (처리형) | iv3000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고처리 [IVAD01]</title>
<link rel="stylesheet" href="../_common-m/mobile.css">
</head>
<body>
<div class="pda-wrap">

  <!-- ── 헤더 ── -->
  <header class="pda-header">
    <button class="header-back" onclick="history.back()">‹</button>
    <div class="header-title">입고처리</div>
    <div class="header-right"></div>
  </header>

  <!-- ── 입고 요약 정보 ── -->
  <div class="proc-hdr">
    <div class="proc-row"><span class="proc-lbl">입고번호</span><span class="proc-val" id="hdrNo"></span></div>
    <div class="proc-row"><span class="proc-lbl">매입처</span><span class="proc-val" id="hdrCust"></span></div>
    <div class="proc-row"><span class="proc-lbl">예정일</span><span class="proc-val" id="hdrDate"></span></div>
    <div class="proc-row"><span class="proc-lbl">입고유형</span><span class="proc-val" id="hdrType"></span></div>
  </div>

  <!-- ── 검색바 ── -->
  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../_common-m/assets/icon-search.png" alt="검색"></span>
      <input type="text" id="itemSearch" placeholder="품목코드/바코드 스캔 및 입력" oninput="renderItems()">
      <button class="search-act-btn" onclick="alert('[스캔]\n바코드 스캐너를 실행합니다.')"><img src="../_common-m/assets/icon-schBarcode.png" alt="바코드"></button>
    </div>
  </div>

  <!-- ── 전체선택 바 ── -->
  <div class="chk-all-bar">
    <label><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)"> 전체선택</label>
    <span class="proc-total-txt" id="totalTxt">총처리: 0 / 0</span>
  </div>

  <!-- ── 품목 목록 ── -->
  <main class="pda-content">
    <div id="itemList"></div>
  </main>

  <!-- ── 하단 버튼 ── -->
  <div class="footer-cta">
    <button class="pda-btn btn-gray" onclick="history.back()">닫기</button>
    <button class="pda-btn btn-blue" onclick="doProcess()">처리완료</button>
  </div>
</div>

<!-- ── 수량 키패드 ── -->
<div class="numpad-overlay" id="numpadOverlay">
  <div class="numpad-box">
    <div class="numpad-title" id="numpadTitle">처리수량 입력</div>
    <div class="numpad-out" id="numpadOut">0</div>
    <div class="numpad-grid">
      <button class="np-key" onclick="npInput('1')">1</button>
      <button class="np-key" onclick="npInput('2')">2</button>
      <button class="np-key" onclick="npInput('3')">3</button>
      <button class="np-key" onclick="npInput('4')">4</button>
      <button class="np-key" onclick="npInput('5')">5</button>
      <button class="np-key" onclick="npInput('6')">6</button>
      <button class="np-key" onclick="npInput('7')">7</button>
      <button class="np-key" onclick="npInput('8')">8</button>
      <button class="np-key" onclick="npInput('9')">9</button>
      <button class="np-key np-zero" onclick="npInput('0')">0</button>
      <button class="np-key np-del" onclick="npDel()">⌫</button>
    </div>
    <div class="numpad-btns">
      <button class="pda-btn btn-gray" onclick="closeNumpad()">취소</button>
      <button class="pda-btn btn-blue" onclick="applyNumpad()">확인</button>
    </div>
  </div>
</div>

<script src="./ivad01m-mock-data.js"></script>
<script>
var items = [];
var npTargetIdx = -1;

function renderHeader() {
  var h = IVAD01_DATA.header;
  document.getElementById('hdrNo'  ).textContent = h.no;
  document.getElementById('hdrCust').textContent = h.cust;
  document.getElementById('hdrDate').textContent = h.date;
  document.getElementById('hdrType').textContent = h.type;
}

function renderItems() {
  var q = document.getElementById('itemSearch').value.toLowerCase();
  var html = '';
  items.forEach(function(it, i) {
    if (q && !it.code.toLowerCase().includes(q) && !it.name.toLowerCase().includes(q)) return;
    html += '<div class="proc-card">'
      + '<div class="proc-card-hdr">'
      +   '<input type="checkbox" '+ (it.checked ? 'checked' : '') +' onchange="toggleItem('+ i +',this.checked)" style="width:18px;height:18px">'
      +   '<span class="proc-card-code">'+ it.code +'</span>'
      +   '<span class="proc-card-name">'+ it.name +'</span>'
      +   '<span style="font-size:12px;color:#555;flex-shrink:0">'+ it.unit +'</span>'
      + '</div>'
      + '<div class="proc-qty-row">'
      +   '<div class="proc-qty-cell"><span class="qty-num">'+ it.prevQty +'</span><div class="qty-lbl">기처리</div></div>'
      +   '<div class="proc-qty-cell"><span class="qty-num edit" onclick="openNumpad('+ i +')">'+ it.procQty +'</span><div class="qty-lbl">처리수량 ✎</div></div>'
      +   '<div class="proc-qty-cell"><span class="qty-num">'+ it.reqQty +'</span><div class="qty-lbl">예정수량</div></div>'
      + '</div></div>';
  });
  document.getElementById('itemList').innerHTML = html || '<div class="empty-msg">품목이 없습니다.</div>';
  updateTotal();
}

function toggleItem(i, v) { items[i].checked = v; updateTotal(); }
function toggleAll(v) { items.forEach(function(it){ it.checked = v; }); renderItems(); }

function updateTotal() {
  var proc = items.reduce(function(s,it){ return s + (it.checked ? it.procQty : 0); }, 0);
  var req  = items.reduce(function(s,it){ return s + it.reqQty; }, 0);
  document.getElementById('totalTxt').textContent = '총처리: ' + proc + ' / ' + req;
  var allChecked = items.length > 0 && items.every(function(it){ return it.checked; });
  document.getElementById('chkAll').checked = allChecked;
}

/* Numpad */
var npVal = '';
function openNumpad(i) {
  npTargetIdx = i;
  npVal = String(items[i].procQty);
  document.getElementById('numpadTitle').textContent = items[i].name + ' 처리수량';
  document.getElementById('numpadOut').textContent = npVal;
  document.getElementById('numpadOverlay').classList.add('show');
}
function closeNumpad() { document.getElementById('numpadOverlay').classList.remove('show'); }
function npInput(v) {
  if (npVal === '0') npVal = v; else npVal += v;
  document.getElementById('numpadOut').textContent = npVal;
}
function npDel() {
  npVal = npVal.length > 1 ? npVal.slice(0,-1) : '0';
  document.getElementById('numpadOut').textContent = npVal;
}
function applyNumpad() {
  items[npTargetIdx].procQty = parseInt(npVal) || 0;
  closeNumpad();
  renderItems();
}

function doProcess() {
  var checked = items.filter(function(it){ return it.checked; });
  if (!checked.length) { alert('처리할 품목을 선택하세요.'); return; }
  if (confirm('선택된 ' + checked.length + '건을 처리완료 하시겠습니까?')) {
    alert('처리가 완료되었습니다.');
    history.back();
  }
}

window.addEventListener('DOMContentLoaded', function() {
  renderHeader();
  items = JSON.parse(JSON.stringify(IVAD01_DATA.items)).map(function(it){
    it.checked = false; return it;
  });
  renderItems();
});
</script>
</body>
</html>
