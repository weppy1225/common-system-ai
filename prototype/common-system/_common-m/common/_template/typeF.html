<!--
  wireframe-only | {{MENU_CODE}} | {{MENU_NAME}} | Type F (설정형) | {{GROUP_CODE}}
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{MENU_NAME}} [{{MENU_CODE}}]</title>
<link rel="stylesheet" href="../_common-m/mobile.css">
<style>
.setting-grp-lbl {
  font-size: 12px;
  font-weight: 700;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 14px 16px 6px;
  background: #f4f6f9;
}
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 16px;
  background: #fff;
  border-bottom: 1px solid #f0f2f5;
  cursor: pointer;
  transition: background .1s;
}
.setting-row:active { background: #f0fbff; }
.setting-row-left { display: flex; align-items: center; gap: 12px; }
.setting-row-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.setting-row-name { font-size: 15px; font-weight: 500; color: #111827; }
.setting-row-sub { font-size: 12px; color: #9ca3af; margin-top: 1px; }
.setting-row-right { color: #c0c7d0; font-size: 18px; line-height: 1; }
.setting-user-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 16px;
  background: #fff;
  border-bottom: 1px solid #f0f2f5;
}
.setting-user-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #00afec, #0085b5);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 22px; font-weight: 700; flex-shrink: 0;
}
.setting-user-name { font-size: 18px; font-weight: 700; color: #111827; }
.setting-user-role { font-size: 13px; color: #6b7280; margin-top: 2px; }
.setting-logout-btn {
  margin-left: auto; height: 34px; padding: 0 14px;
  border: 1.5px solid #e5e7eb; border-radius: 10px;
  background: #fff; font-size: 13px; color: #6b7280;
  cursor: pointer; font-family: inherit; font-weight: 500;
}
{{CUSTOM_CSS}}
</style>
</head>
<body>
<div class="pda-wrap">

  <!-- ── 헤더 ── -->
  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">{{MENU_NAME}}</div>
    <div class="header-right"></div>
  </header>

  <!-- ── 설정 목록 ── -->
  <main class="pda-content">
    {{SETTING_SECTIONS}}
  </main>

  <!-- ── 하단 탭바 ── -->
  {{TAB_BAR}}

</div>

<script src="./{{MENU_CODE}}-data.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  /* 초기 데이터 로드 */
});

{{SCRIPT_BODY}}
</script>
</body>
</html>
