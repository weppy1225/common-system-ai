  wireframe-only | MENU | 메뉴 그리드 | dist-mobile/menu.html
  Reference: 2.png — WMS Cloud Mobile Menu Screen
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴</title>
<link rel="stylesheet" href="./mobile.css">
<style>
.menu-hdr{
  height:50px;display:flex;align-items:center;
  justify-content:center;position:relative;
  border-bottom:1px solid #f0f2f5;flex-shrink:0;background:#fff;
}
.menu-hdr-title{font-size:18px;font-weight:700;color:#1c2333}
.menu-hdr-close{
  position:absolute;right:10px;
  width:40px;height:40px;border:none;background:none;
  font-size:22px;color:#9ca3af;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

.menu-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
}
.menu-cell{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:22px 8px;
  border-right:1px solid #f0f2f5;
  border-bottom:1px solid #f0f2f5;
  cursor:pointer;transition:background .1s;background:#fff;
}
.menu-cell:active{background:#f0fbff}
.menu-cell:nth-child(3n){border-right:none}
.menu-ico{
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.menu-ico img{width:60px;height:60px;object-fit:contain}
</style>
</head>
<body>
<div class="pda-wrap">

  <!-- 헤더 -->
  <div class="menu-hdr">
    <span class="menu-hdr-title">메뉴</span>
    <button class="menu-hdr-close" onclick="history.back()">✕</button>
  </div>

  <!-- 메뉴 그리드 -->
  <main class="pda-content">
    <div class="menu-grid">

      <div class="menu-cell" onclick="location.href='./../ivmv01m/ivmv01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-iwrq.png" alt="입고예정"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../owrq01m/owrq01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-owrq.png" alt="피킹"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../ldpc01m/ldpc01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-owld.png" alt="검수"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../strg01m/strg01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-ivmv.png" alt="재고이동"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../ivmvrq01m/ivmvrq01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-ivmv-rq.png" alt="재고이동요청"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../spmv01m/spmv01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-ivad.png" alt="보충이동확인"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../brsc01m/brsc01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-brsc.png" alt="재고조회"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../flsc01m/flsc01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-mdlc.png" alt="고정위치조회"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../mdpr01m/mdpr01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-skmg.png" alt="사은품관리"></div>
      </div>

      <div class="menu-cell" onclick="location.href='./../smst01m/smst01m-wireframe.html'">
        <div class="menu-ico"><img src="./assets/icon-menuSetting.png" alt="설정"></div>
      </div>

    </div>
  </main>

</div>
</body>
</html>
