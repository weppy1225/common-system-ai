<!-- UI유형: 그리드 1개 — {{MAIN_AREA}} 자리에 들어간다 -->
<div class="main-area">

  <div class="panel">
    <div class="toolbar">
      <div class="toolbar-left">
        {{GRID_MAIN_TOOLBAR}}
      </div>
      <div class="toolbar-right">
        <!-- 엑셀다운로드 등 (명세에 있을 때만) -->
      </div>
    </div>
    <div class="grid-wrap" id="mainWrap">
      <table class="grid-table" id="mainTable">
        <colgroup>
          {{GRID_MAIN_COLGROUP}}
        </colgroup>
        <thead>
          {{GRID_MAIN_THEAD}}
        </thead>
        <tbody id="mainTbody"></tbody>
      </table>
    </div>
    <div class="h-scroll-wrap" id="mainHScroll"><div class="h-scroll-inner" id="mainHInner"></div></div>
    <div class="grid-footer">
      <div class="pagination" id="mainPaging"></div>
      <div class="page-size-wrap">
        <select id="mainPageSize" onchange="changeMainPageSize()">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <span class="row-count" id="mainRowCount"></span>
    </div>
  </div>

</div>
