<!--
  wireframe-only | IVMV01 | 입고예정 목록 | Type A (목록형) | iv3000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고예정 목록 [IVMV01]</title>
<link rel="stylesheet" href="../_common-m/mobile.css">
</head>
<body>
<div class="pda-wrap">

  <!-- ── 헤더 ── -->
  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">입고예정</div>
    <div class="header-right"></div>
  </header>

  <!-- ── 검색바 ── -->
  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../_common-m/assets/icon-search.png" alt="검색"></span>
      <input type="text" id="searchInput" placeholder="입고번호 스캔 및 입력" oninput="renderCards()">
      <button class="search-act-btn" id="barcodeBtn" title="바코드 스캔" onclick="toggleBarcode()"><img src="../_common-m/assets/icon-schBarcode.png" alt="바코드"></button>
      <button class="search-act-btn" title="필터" onclick="openFilter()"><img src="../_common-m/assets/icon-filter.png" alt="필터"></button>
    </div>
  </div>

  <!-- ── 카드 목록 ── -->
  <main class="pda-content">
    <div class="card-list" id="cardList"></div>
  </main>

  <!-- ── 하단 탭바 ── -->
  <nav class="tab-bar">
    <button class="tab-item" onclick="location.href='../_common-m/main.html'">
      <img src="../_common-m/assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item on">
      <img src="../_common-m/assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item" onclick="location.href='../owrq01m/owrq01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer01.png" alt="피킹">
    </button>
    <button class="tab-item" onclick="location.href='../strg01m/strg01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item" onclick="location.href='../_common-m/menu.html'">
      <img src="../_common-m/assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>

<!-- ── 필터 시트 ── -->
<div class="filter-overlay" id="filterOverlay" onclick="closeFilter()"></div>
<div class="filter-sheet" id="filterSheet">
  <div class="filter-hdr">
    <span class="filter-ttl">입고 검색</span>
    <button class="filter-close-btn" onclick="closeFilter()">✕</button>
  </div>

  <div class="filter-sec">
    <div class="filter-lbl">사업장</div>
    <select class="pda-sel"><option>메가랩</option><option>부산센터</option></select>
  </div>

  <div class="filter-sec">
    <div class="filter-lbl">입고유형</div>
    <div class="chip-wrap" id="typeChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="국내입고">국내입고</button>
      <button class="chip" data-v="수입입고">수입입고</button>
      <button class="chip" data-v="반품입고">반품입고</button>
    </div>
  </div>

  <div class="filter-sec">
    <div class="filter-lbl">진행상태</div>
    <div class="chip-wrap" id="stsChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="00">대기</button>
      <button class="chip" data-v="17">준비</button>
      <button class="chip" data-v="55">처리중</button>
      <button class="chip" data-v="77">확정</button>
      <button class="chip" data-v="99">취소</button>
    </div>
  </div>

  <div class="filter-sec">
    <div class="filter-lbl">예정일자</div>
    <div class="date-rng">
      <input class="pda-date" type="date" id="dateFrom" value="2024-11-01">
      <span class="tilde">~</span>
      <input class="pda-date" type="date" id="dateTo"   value="2024-11-30">
    </div>
  </div>

  <div class="filter-ftr">
    <button class="pda-btn btn-gray" onclick="resetFilter()">초기화</button>
    <button class="pda-btn btn-blue" onclick="applyFilter()">검색</button>
  </div>
</div>

<script src="./ivmv01m-mock-data.js"></script>
<script>
var filtered = [];
var activeType = '';
var activeSts  = '';

function renderCards() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  filtered = IVMV01_DATA.filter(function(d) {
    var matchQ   = !q || d.no.toLowerCase().includes(q) || d.cust.toLowerCase().includes(q);
    var matchT   = !activeType || d.type === activeType;
    var matchSts = !activeSts  || d.sts  === activeSts;
    return matchQ && matchT && matchSts;
  });
  var html = '';
  if (!filtered.length) {
    html = '<div class="empty-msg">조회된 데이터가 없습니다.</div>';
  } else {
    filtered.forEach(function(d) {
      html += '<div class="card-row" onclick="goDetail(\''+ d.no +'\')">'
        + '<div class="card-sts sts-' + d.sts + '">' + d.stsNm + '</div>'
        + '<div class="card-body">'
        +   '<div class="card-tags"><span class="c-tag">'+ d.site +'</span><span class="c-tag">'+ d.type +'</span></div>'
        +   '<div class="card-r1"><span>'+ d.no +'</span><span>'+ d.date +'</span></div>'
        +   '<div class="card-r2"><span>'+ d.cust +'</span><span class="card-cnt">'+ d.cnt +'건 ›</span></div>'
        + '</div></div>';
    });
  }
  document.getElementById('cardList').innerHTML = html;
}

function goDetail(no) {
  location.href = './IVAD01.html?no=' + no;
}

function openFilter() {
  document.getElementById('filterOverlay').classList.add('show');
  document.getElementById('filterSheet').classList.add('show');
}
function closeFilter() {
  document.getElementById('filterOverlay').classList.remove('show');
  document.getElementById('filterSheet').classList.remove('show');
}
function applyFilter() { closeFilter(); renderCards(); }
function resetFilter() {
  activeType = ''; activeSts = '';
  document.querySelectorAll('#typeChips .chip').forEach(function(c){c.classList.toggle('on', c.dataset.v === '')});
  document.querySelectorAll('#stsChips  .chip').forEach(function(c){c.classList.toggle('on', c.dataset.v === '')});
  document.getElementById('dateFrom').value = '2024-11-01';
  document.getElementById('dateTo'  ).value = '2024-11-30';
}

function setupChips(wrapperId, setFn) {
  document.getElementById(wrapperId).addEventListener('click', function(e) {
    var btn = e.target.closest('.chip');
    if (!btn) return;
    this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
    btn.classList.add('on');
    setFn(btn.dataset.v);
  });
}

function toggleBarcode() {
  var btn = document.getElementById('barcodeBtn');
  var inp = document.getElementById('searchInput');
  if (inp.value) { inp.value = ''; btn.textContent = '▦'; renderCards(); }
  else           { alert('[바코드 스캔]\n카메라 스캐너를 실행합니다.'); }
}

window.addEventListener('DOMContentLoaded', function() {
  setupChips('typeChips', function(v){ activeType = v; });
  setupChips('stsChips',  function(v){ activeSts  = v; });
  renderCards();
});
</script>
</body>
</html>
