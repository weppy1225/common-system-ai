<!--
  wireframe-only | MDPD01 | 품목 목록 | Type A+F (목록/설정형) | md8000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품목 목록 [MDPD01]</title>
<link rel="stylesheet" href="../_common-m/mobile.css">
<style>
.prod-item{
  display:flex;align-items:center;
  padding:14px 16px;border-bottom:1px solid #f0f2f5;
  cursor:pointer;transition:background .1s;background:#fff;
}
.prod-item:active{background:#f0fbff}
.prod-icon{
  width:44px;height:44px;border-radius:12px;
  background:#e0f7fe;color:#0369a1;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;margin-right:12px;
}
.prod-body{flex:1;min-width:0}
.prod-code{font-size:11px;color:#b8bdc6;margin-bottom:2px;letter-spacing:.3px}
.prod-name{font-size:15px;font-weight:700;color:#1c2333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-sub{font-size:12px;color:#9ca3af;margin-top:4px;display:flex;gap:10px}
.use-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0;line-height:1.4}
.use-y{background:#d4efdf;color:#1e8449}
.use-n{background:#fde8e8;color:#c0392b}
.cat-chip{display:inline-block;font-size:11px;border-radius:8px;background:#eff6ff;padding:2px 8px;color:#3b82f6;font-weight:500}
</style>
</head>
<body>
<div class="pda-wrap">

  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">품목</div>
    <div class="header-right"></div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../_common-m/assets/icon-search.png" alt="검색"></span>
      <input type="text" id="searchInput" placeholder="품목코드/품목명 입력" oninput="renderList()">
      <button class="search-act-btn" onclick="alert('[스캔]\n바코드를 스캔합니다.')"><img src="../_common-m/assets/icon-schBarcode.png" alt="바코드"></button>
      <button class="search-act-btn" onclick="openFilter()"><img src="../_common-m/assets/icon-filter.png" alt="필터"></button>
    </div>
  </div>

  <!-- 카테고리 빠른 필터 (수평 스크롤) -->
  <div style="overflow-x:auto;white-space:nowrap;padding:8px 12px;flex-shrink:0;scrollbar-width:none">
    <div style="display:inline-flex;gap:8px" id="catFilter">
      <button class="chip on" data-v="" onclick="setQuickCat(this,'')">전체</button>
      <button class="chip" data-v="화장품" onclick="setQuickCat(this,'화장품')">화장품</button>
      <button class="chip" data-v="스킨케어" onclick="setQuickCat(this,'스킨케어')">스킨케어</button>
      <button class="chip" data-v="세럼" onclick="setQuickCat(this,'세럼')">세럼</button>
      <button class="chip" data-v="메이크업" onclick="setQuickCat(this,'메이크업')">메이크업</button>
      <button class="chip" data-v="클렌징" onclick="setQuickCat(this,'클렌징')">클렌징</button>
    </div>
  </div>

  <!-- 결과 건수 -->
  <div style="padding:4px 16px 6px;font-size:12px;color:#999;flex-shrink:0" id="resultCount"></div>

  <main class="pda-content">
    <div id="prodList"></div>
  </main>

  <nav class="tab-bar">
    <button class="tab-item" onclick="location.href='../_common-m/main.html'">
      <img src="../_common-m/assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item" onclick="location.href='../ivmv01m/ivmv01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item" onclick="location.href='../owrq01m/owrq01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer01.png" alt="피킹">
    </button>
    <button class="tab-item" onclick="location.href='../strg01m/strg01m-wireframe.html'">
      <img src="../_common-m/assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item on" onclick="location.href='../_common-m/menu.html'">
      <img src="../_common-m/assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>

<!-- 필터 시트 -->
<div class="filter-overlay" id="filterOverlay" onclick="closeFilter()"></div>
<div class="filter-sheet" id="filterSheet">
  <div class="filter-hdr">
    <span class="filter-ttl">품목 검색</span>
    <button class="filter-close-btn" onclick="closeFilter()">✕</button>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">사업장</div>
    <select class="pda-sel"><option>메가랩</option><option>부산센터</option></select>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">카테고리</div>
    <div class="chip-wrap" id="catChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="화장품">화장품</button>
      <button class="chip" data-v="스킨케어">스킨케어</button>
      <button class="chip" data-v="세럼">세럼</button>
      <button class="chip" data-v="메이크업">메이크업</button>
      <button class="chip" data-v="클렌징">클렌징</button>
    </div>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">사용여부</div>
    <div class="chip-wrap" id="useChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="Y">사용</button>
      <button class="chip" data-v="N">미사용</button>
    </div>
  </div>
  <div class="filter-ftr">
    <button class="pda-btn btn-gray" onclick="resetFilter()">초기화</button>
    <button class="pda-btn btn-blue" onclick="applyFilter()">검색</button>
  </div>
</div>

<script src="./mdpd01m-mock-data.js"></script>
<script>
var activeCat='', activeUse='';

function renderList(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  var data=MDPD01_DATA.filter(function(d){
    return (!q||d.code.includes(q)||d.name.includes(q)||d.spec.includes(q))
        && (!activeCat||d.cat===activeCat)
        && (!activeUse||d.use===activeUse);
  });
  document.getElementById('resultCount').textContent='총 '+data.length+'건';
  var html='';
  if(!data.length){html='<div class="empty-msg">조회된 데이터가 없습니다.</div>';}
  else data.forEach(function(d){
    var badge=d.use==='Y'?'<span class="use-badge use-y">사용</span>':'<span class="use-badge use-n">미사용</span>';
    html+='<div class="prod-item" onclick="showDetail(\''+d.code+'\')">'
      +'<div class="prod-icon">📦</div>'
      +'<div class="prod-body"><div class="prod-code">'+d.code+'</div><div class="prod-name">'+d.name+'</div><div class="prod-sub"><span class="cat-chip">'+d.cat+'</span><span>규격: '+d.spec+'</span><span>단위: '+d.unit+'</span></div></div>'
      +badge+'</div>';
  });
  document.getElementById('prodList').innerHTML=html;
}

function setQuickCat(btn, val){
  document.querySelectorAll('#catFilter .chip').forEach(function(c){c.classList.remove('on')});
  btn.classList.add('on'); activeCat=val; renderList();
}

function showDetail(code){
  var d=MDPD01_DATA.find(function(x){return x.code===code;});
  alert('[품목 상세]\n품목코드: '+d.code+'\n품목명: '+d.name+'\n규격: '+d.spec+'\n단위: '+d.unit+'\n카테고리: '+d.cat+'\n사용여부: '+(d.use==='Y'?'사용':'미사용'));
}

function openFilter(){document.getElementById('filterOverlay').classList.add('show');document.getElementById('filterSheet').classList.add('show');}
function closeFilter(){document.getElementById('filterOverlay').classList.remove('show');document.getElementById('filterSheet').classList.remove('show');}
function applyFilter(){closeFilter();renderList();}
function resetFilter(){activeCat='';activeUse='';document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on',c.dataset.v==='');});}

function setupChips(id,fn){
  document.getElementById(id).addEventListener('click',function(e){
    var b=e.target.closest('.chip');if(!b)return;
    this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
    b.classList.add('on');fn(b.dataset.v);
  });
}

window.addEventListener('DOMContentLoaded',function(){
  setupChips('catChips',function(v){activeCat=v;});
  setupChips('useChips',function(v){activeUse=v;});
  renderList();
});
</script>
</body>
</html>
