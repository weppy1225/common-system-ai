<!--
  wireframe-only | OWRQ01 | 피킹목록 | Type A (목록형) | ow5000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피킹목록 [OWRQ01]</title>
<link rel="stylesheet" href="../mobile.css">
</head>
<body>
<div class="pda-wrap">

  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">피킹</div>
    <div class="header-right"></div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../assets/icon-search.png" alt="검색"></span>
      <input type="text" id="searchInput" placeholder="피킹번호 스캔 및 입력" oninput="renderCards()">
      <button class="search-act-btn" onclick="alert('[스캔]\n바코드 스캐너를 실행합니다.')"><img src="../assets/icon-schBarcode.png" alt="바코드"></button>
      <button class="search-act-btn" onclick="openFilter()"><img src="../assets/icon-filter.png" alt="필터"></button>
    </div>
  </div>

  <main class="pda-content">
    <div class="card-list" id="cardList"></div>
  </main>

  <nav class="tab-bar">
    <button class="tab-item" onclick="location.href='../main.html'">
      <img src="../assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item" onclick="location.href='../iv3000m/IVMV01.html'">
      <img src="../assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item on">
      <img src="../assets/icon-footer01.png" alt="피킹">
    </button>
    <button class="tab-item" onclick="location.href='../iv3200m/STRG01.html'">
      <img src="../assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item" onclick="location.href='../menu.html'">
      <img src="../assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>

<!-- 필터 시트 -->
<div class="filter-overlay" id="filterOverlay" onclick="closeFilter()"></div>
<div class="filter-sheet" id="filterSheet">
  <div class="filter-hdr">
    <span class="filter-ttl">피킹 검색</span>
    <button class="filter-close-btn" onclick="closeFilter()">✕</button>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">피킹처리유형</div>
    <div class="chip-wrap" id="typeChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="총괄">총괄</button>
      <button class="chip" data-v="납품처별">납품처별</button>
    </div>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">요청일</div>
    <div class="date-rng">
      <input class="pda-date" type="date" value="2026-05-08">
      <span class="tilde">~</span>
      <input class="pda-date" type="date" value="2026-05-14">
    </div>
  </div>
  <div class="filter-sec">
    <div class="filter-lbl">상태</div>
    <div class="chip-wrap" id="stsChips">
      <button class="chip on" data-v="">전체</button>
      <button class="chip" data-v="00">예정</button>
      <button class="chip" data-v="55">처리중</button>
      <button class="chip" data-v="77">확정</button>
    </div>
  </div>
  <div class="filter-ftr">
    <button class="pda-btn btn-gray" onclick="resetFilter()">초기화</button>
    <button class="pda-btn btn-blue" onclick="applyFilter()">검색</button>
  </div>
</div>

<script src="./OWRQ01-data.js"></script>
<script>
var activeType = '', activeSts = '';

function renderCards() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var data = OWRQ01_DATA.filter(function(d) {
    return (!q || d.no.toLowerCase().includes(q) || d.dest.toLowerCase().includes(q))
        && (!activeType || d.type === activeType)
        && (!activeSts  || d.sts  === activeSts);
  });
  var html = '';
  if (!data.length) { html = '<div class="empty-msg">조회된 데이터가 없습니다.</div>'; }
  else data.forEach(function(d) {
    html += '<div class="card-row" onclick="location.href=\'./OWPC01.html\'">'
      + '<div class="card-sts sts-' + d.sts + '">' + d.stsNm + '</div>'
      + '<div class="card-body">'
      +   '<div class="card-tags"><span class="c-tag">'+ d.site +'</span><span class="c-tag">'+ d.type +'</span></div>'
      +   '<div class="card-r1"><span>'+ d.no +'</span><span>'+ d.date +'</span></div>'
      +   '<div class="card-r2"><span>'+ d.dest +'</span><span class="card-cnt">'+ d.cnt +'건 ›</span></div>'
      +   (d.note ? '<div style="font-size:12px;color:#888;margin-top:2px">'+ d.note +'</div>' : '')
      + '</div></div>';
  });
  document.getElementById('cardList').innerHTML = html;
}

function openFilter() { document.getElementById('filterOverlay').classList.add('show'); document.getElementById('filterSheet').classList.add('show'); }
function closeFilter() { document.getElementById('filterOverlay').classList.remove('show'); document.getElementById('filterSheet').classList.remove('show'); }
function applyFilter() { closeFilter(); renderCards(); }
function resetFilter() { activeType=''; activeSts=''; document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on', c.dataset.v==='');}); }

function setupChips(id, fn) {
  document.getElementById(id).addEventListener('click', function(e) {
    var b = e.target.closest('.chip'); if (!b) return;
    this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
    b.classList.add('on'); fn(b.dataset.v);
  });
}

window.addEventListener('DOMContentLoaded', function() {
  setupChips('typeChips', function(v){ activeType=v; });
  setupChips('stsChips',  function(v){ activeSts=v;  });
  renderCards();
});
</script>
</body>
</html>
