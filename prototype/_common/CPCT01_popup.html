<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래처 검색 [CPCT01]</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 12px;
    color: #333;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── 팝업 컨테이너 ── */
  .popup {
    width: 780px;
    background: #ffffff;
    border: 1px solid #888;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    border-radius: 6px;
    overflow: hidden;
  }

  /* ── 타이틀바 ── */
  .popup-title {
    background: #304a6e;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    cursor: move;
    border-radius: 6px 6px 0 0;
  }
  .popup-title .close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
  }
  .popup-title .close-btn:hover { color: #ffd0d0; }

  /* ── 본문 ── */
  .popup-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #ffffff;
  }

  /* ── 검색 영역 ── */
  .search-area {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .search-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .search-table td {
    height: 36px;
    padding: 4px 10px;
    border: 1px solid #e5e7eb;
    font-size: 13px;
  }

  .search-table td.lbl {
    width: 80px;
    background: #f3f4f6;
    color: #374151;
    font-weight: 600;
    font-size: 13px;
    text-align: right;
    padding-right: 12px;
    white-space: nowrap;
  }

  .search-table td.val {
    background: #fff;
  }

  .search-table td.empty-lbl {
    background: #f3f4f6;
  }

  .search-table td.empty-val {
    background: #f3f4f6;
  }

  .search-table input,
  .search-table select {
    width: 100%;
    height: 26px;
    font-size: 13px;
    color: #111827;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    padding: 0 8px;
    font-family: inherit;
    outline: none;
  }

  .search-table input:focus,
  .search-table select:focus {
    border-color: #7aa2c8;
    box-shadow: 0 0 0 2px rgba(122,162,200,0.15);
  }

  /* ── 버튼 영역 ── */
  .btn-area {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 2px 0;
  }

  .btn {
    border: 1px solid #a8bfd8;
    background: #ffffff;
    color: #3a6ea5;
    font-weight: 500;
    width: 74px;
    height: 28px;
    font-size: 13px;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:hover {
    border-color: #7aa2c8;
    background: #f4f8fc;
    color: #2a5a8f;
  }

  /* ── 패널 (그리드 래퍼) ── */
  .panel {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* ── 그리드 스크롤 래퍼 ── */
  .grid-wrap {
    overflow-y: auto;
    overflow-x: hidden;
    height: 260px;   /* thead 30px 제외, tr 26px × 10행 */
    min-height: 260px;
    max-height: 260px;
  }

  /* 커스텀 세로 스크롤바 */
  .grid-wrap::-webkit-scrollbar { width: 8px; height: 0; }
  .grid-wrap::-webkit-scrollbar-track { background: #f1f5f9; }
  .grid-wrap::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
  }
  .grid-wrap::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  .grid-wrap::-webkit-scrollbar-corner { background: #f1f5f9; }

  /* ── 그리드 테이블 ── */
  .grid-table {
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
  }

  /* 헤더 */
  .grid-table thead th {
    background: #f3f4f6;
    color: #374151;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
    border: 1px solid #e5e7eb;
    padding: 3px 4px;
    white-space: nowrap;
    height: 30px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  /* 데이터 셀 */
  .grid-table td {
    height: 26px;
    padding: 1px 4px;
    font-size: 12px;
    color: #111827;
    border: 1px solid #e5e7eb;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .grid-table tbody tr {
    cursor: pointer;
    background: #fff;
  }
  .grid-table tbody tr:hover { background: #eff6ff; }
  .grid-table tbody tr.selected { background: #dbeafe; }

  /* 정렬 유틸 */
  .tc { text-align: center; }
  .tl { text-align: left; }
  .tr { text-align: right; }

  /* 빈 메시지 */
  .empty-td {
    height: 26px;
    padding: 110px 0 !important;
    text-align: center;
    vertical-align: middle;
    color: #999;
    font-size: 13px;
    border: none !important;
  }

  /* ── 페이징 footer ── */
  .grid-footer {
    height: 40px;
    background: #fafafa;
    border-top: 1px solid #e5e7eb;
    padding: 5px 10px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .pagination {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .page-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid #e5e7eb;
    background: #fff;
    font-size: 13px;
    color: #374151;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .page-btn:hover { background: #f1f5f9; }
  .page-btn.active { background: #4b5563; color: #fff; border-color: #4b5563; }

  .page-size-wrap {
    margin-left: 10px;
    display: flex;
    align-items: center;
  }

  .page-size-wrap select {
    height: 28px;
    min-width: 64px;
    padding: 0 20px 0 8px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
    background: #fff;
    cursor: pointer;
    outline: none;
  }

  .row-count {
    position: absolute;
    right: 12px;
    font-size: 11px;
    color: #6b7280;
  }
</style>
</head>
<body>

<div class="popup" id="popup">
  <!-- 타이틀 -->
  <div class="popup-title" id="dragHandle">
    거래처 검색 [CPCT01]
    <button class="close-btn" onclick="closePopup()" title="닫기">✕</button>
  </div>

  <!-- 본문 -->
  <div class="popup-body">
    <!-- 검색 조건 -->
    <div class="search-area">
      <table class="search-table">
        <colgroup>
          <col style="width: 72px">
          <col style="width: 25%">
          <col style="width: 72px">
          <col style="width: 25%">
          <col style="width: 72px">
          <col style="width: 25%">
          <col style="width: 72px">
          <col style="width: 25%">
        </colgroup>
        <tbody>
          <tr>
            <td class="lbl">사업장</td>
            <td class="val">
              <select id="bizPlace">
                <option value="10">아임유어박스</option>
                <option value="20">본사</option>
                <option value="30">물류센터</option>
              </select>
            </td>
            <td class="lbl">거래처번호</td>
            <td class="val">
              <input type="text" id="cpctNo" maxlength="20" onkeydown="handleKey(event)">
            </td>
            <td class="lbl">거래처명</td>
            <td class="val">
              <input type="text" id="cpctNm" maxlength="50" onkeydown="handleKey(event)">
            </td>
            <td class="lbl">거래처구분</td>
            <td class="val">
              <select id="cpctDiv">
                <option value="">전체</option>
                <option value="매입처">매입처</option>
                <option value="매출처">매출처</option>
                <option value="혼합">혼합</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 버튼 -->
    <div class="btn-area">
      <button class="btn" onclick="doSearch()">검&nbsp;&nbsp;색</button>
      <button class="btn" onclick="doReset()">초기화</button>
    </div>

    <!-- 그리드 패널 -->
    <div class="panel">
      <div class="grid-wrap" id="gridWrap">
        <table class="grid-table" id="gridTable">
          <thead>
            <tr>
              <th style="width:40px">No.</th>
              <th style="width:100px">거래처번호</th>
              <th style="width:160px">거래처명</th>
              <th style="width:80px">거래처구분</th>
              <th style="width:110px">전화번호</th>
              <th style="width:120px">사업자번호</th>
              <th>주소</th>
            </tr>
          </thead>
          <tbody id="gridBody">
            <tr><td colspan="7" class="empty-td">검색 조건을 입력 후 검색하세요.</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 페이징 footer -->
      <div class="grid-footer">
        <div class="pagination" id="pagination">
          <button class="page-btn active">1</button>
        </div>
        <div class="page-size-wrap">
          <select id="pageSize">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </div>
        <span class="row-count" id="rowCount">0 rows</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── 샘플 데이터 ──
const sampleData = [
  { no:1,  cpctNo:'C001', cpctNm:'(주)삼성전자',       cpctDiv:'매출처', telNo:'02-1234-5678',  bizNo:'123-45-67890', addr:'경기도 수원시 영통구 삼성로 129' },
  { no:2,  cpctNo:'C002', cpctNm:'LG전자(주)',           cpctDiv:'매출처', telNo:'02-9876-5432',  bizNo:'234-56-78901', addr:'서울특별시 영등포구 여의대로 128' },
  { no:3,  cpctNo:'C003', cpctNm:'현대자동차',           cpctDiv:'매입처', telNo:'02-3456-7890',  bizNo:'345-67-89012', addr:'서울특별시 서초구 헌릉로 12' },
  { no:4,  cpctNo:'C004', cpctNm:'롯데쇼핑(주)',         cpctDiv:'혼합',   telNo:'02-2222-3333',  bizNo:'456-78-90123', addr:'서울특별시 송파구 올림픽로 300' },
  { no:5,  cpctNo:'C005', cpctNm:'CJ대한통운',           cpctDiv:'매입처', telNo:'1588-1255',     bizNo:'567-89-01234', addr:'서울특별시 중구 소월로2길 12' },
  { no:6,  cpctNo:'C006', cpctNm:'(주)신세계',           cpctDiv:'혼합',   telNo:'02-1234-1234',  bizNo:'678-90-12345', addr:'서울특별시 중구 소공로 63' },
  { no:7,  cpctNo:'C007', cpctNm:'GS칼텍스(주)',         cpctDiv:'매입처', telNo:'02-6005-1000',  bizNo:'789-01-23456', addr:'서울특별시 강남구 논현로 508' },
  { no:8,  cpctNo:'C008', cpctNm:'한화솔루션(주)',       cpctDiv:'매출처', telNo:'02-729-1234',   bizNo:'890-12-34567', addr:'서울특별시 중구 청계천로 86' },
  { no:9,  cpctNo:'C009', cpctNm:'포스코인터내셔널',     cpctDiv:'혼합',   telNo:'02-3457-0114',  bizNo:'901-23-45678', addr:'서울특별시 강남구 테헤란로 440' },
  { no:10, cpctNo:'C010', cpctNm:'SK하이닉스(주)',       cpctDiv:'매출처', telNo:'031-630-4114',  bizNo:'012-34-56789', addr:'경기도 이천시 부발읍 경충대로 2091' },
];

let currentData = [];
let selectedRow = null;

function doSearch() {
  const cpctNo  = document.getElementById('cpctNo').value.trim().toLowerCase();
  const cpctNm  = document.getElementById('cpctNm').value.trim().toLowerCase();
  const cpctDiv = document.getElementById('cpctDiv').value;

  const result = sampleData.filter(r => {
    if (cpctNo  && !r.cpctNo.toLowerCase().includes(cpctNo))  return false;
    if (cpctNm  && !r.cpctNm.toLowerCase().includes(cpctNm))  return false;
    if (cpctDiv && r.cpctDiv !== cpctDiv)                      return false;
    return true;
  });

  currentData = result;
  renderGrid(result);
}

function renderGrid(data) {
  const tbody    = document.getElementById('gridBody');
  const rowCount = document.getElementById('rowCount');
  rowCount.textContent = data.length > 0 ? `1 ~ ${data.length} of ${data.length} rows` : '0 rows';

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-td">조회된 데이터가 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map((r, i) => `
    <tr onclick="selectRow(this, ${i})" ondblclick="confirmSelect(${i})">
      <td class="tc">${r.no}</td>
      <td class="tc">${r.cpctNo}</td>
      <td class="tl">${r.cpctNm}</td>
      <td class="tc">${r.cpctDiv}</td>
      <td class="tc">${r.telNo}</td>
      <td class="tc">${r.bizNo}</td>
      <td class="tl">${r.addr}</td>
    </tr>
  `).join('');
}

function selectRow(el, idx) {
  document.querySelectorAll('#gridBody tr').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  selectedRow = currentData[idx];
}

function confirmSelect(idx) {
  selectedRow = currentData[idx];
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'CPCT01_select', data: selectedRow }, '*');
  } else {
    alert(`선택: [${selectedRow.cpctNo}] ${selectedRow.cpctNm}`);
  }
}

function doReset() {
  document.getElementById('cpctNo').value  = '';
  document.getElementById('cpctNm').value  = '';
  document.getElementById('cpctDiv').value = '';
  document.getElementById('gridBody').innerHTML =
    '<tr><td colspan="7" class="empty-td">검색 조건을 입력 후 검색하세요.</td></tr>';
  document.getElementById('rowCount').textContent = '0 rows';
  currentData  = [];
  selectedRow  = null;
}

function closePopup() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'CPCT01_close' }, '*');
  } else {
    document.querySelector('.popup').style.display = 'none';
  }
}

function handleKey(e) {
  if (e.key === 'Enter') doSearch();
}

// ── 초기 로드 시 전체 검색 / iframe 내부 감지 ──
window.onload = function() {
  doSearch();
  if (window.parent !== window) {
    document.body.style.background = 'transparent';
    document.body.style.minHeight  = 'auto';
    document.body.style.alignItems = 'flex-start';
  }
};

// ── 드래그 이동 ──
(function() {
  const handle = document.getElementById('dragHandle');
  const popup  = document.getElementById('popup');
  let dragging = false, ox = 0, oy = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    const rect = popup.getBoundingClientRect();
    ox = e.clientX - rect.left;
    oy = e.clientY - rect.top;
    popup.style.position = 'fixed';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    popup.style.left = (e.clientX - ox) + 'px';
    popup.style.top  = (e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();
</script>
</body>
</html>
