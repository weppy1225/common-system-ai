    var edgeGap=srcOnLeft?(tx-(fx+fw)):(fx-(tx+tw));
    if(edgeGap<60){
      // Too close horizontally: route below both tables to avoid overlap
      var loopY=Math.max(fy+fh,ty+th)+80;
      d='M'+(fx+fw/2)+','+(fy+fh)+' C'+(fx+fw/2)+','+loopY+' '+(tx+tw/2)+','+loopY+' '+(tx+tw/2)+','+(ty+th);
    } else {
      var x1,y1,x2,y2;
      if(srcOnLeft){x1=fx+fw;y1=fy+fh/2;x2=tx;y2=ty+th/2;}
      else{x1=fx;y1=fy+fh/2;x2=tx+tw;y2=ty+th/2;}
      var dx=Math.abs(x2-x1)*0.5;
      d='M'+x1+','+y1+' C'+(x1+dx)+','+y1+' '+(x2-dx)+','+y2+' '+x2+','+y2;
    }
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width',sw);
    path.setAttribute('fill','none');
    path.setAttribute('marker-end','url(#'+mId+')');
    path.setAttribute('opacity',isHL?'1':'0.75');
    path.setAttribute('vector-effect','non-scaling-stroke');
    svg.appendChild(path);
  });
}
function onTblMouseDown(e){

document.addEventListener('mousemove',function(e){
  if(dragState){
    var dx=(e.clientX-dragState.startX)/(zoom/100),dy=(e.clientY-dragState.startY)/(zoom/100);

},{passive:false});
function buildTableList(){

  if(!container)return;

  var parentOrder=['wms','mdm','sm','sif','wes'];

    var pgDef=PARENT_GROUPS[pg]; if(!pgDef)return;
    var children=SUBGROUP_DEF.filter(function(s){return s.parent===pg&&(subCounts[s.id]||0)>0;});
    if(!children.length)return;

    var parentCnt=children.reduce(function(sum,s){return sum+(subCounts[s.id]||0);},0);

    // Parent row

    toggleSpan.textContent='▶'; toggleSpan.style.cssText='font-size:9px;color:#94a3b8;width:10px;flex-shrink:0;';
    toggleSpan.dataset.pg=pg;
    var pCb=document.createElement('input'); pCb.type='checkbox'; pCb.style.cssText='width:12px;height:12px;flex-shrink:0;cursor:pointer;';
    pCb.checked=false; pCb.indeterminate=false;
    pCb.dataset.pg=pg;

    badge.className='grp-badge grp-'+pg; badge.textContent=pg.toUpperCase();
    badge.style.cssText='font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0;';
    var pNm=document.createElement('span');

    var pCnt=document.createElement('span');
    pCnt.textContent=parentCnt; pCnt.style.cssText='font-size:10px;color:#9ca3af;flex-shrink:0;';

    var childWrap=document.createElement('div');

    // Child sub-group rows + table items
    children.forEach(function(sg){
      var cnt=subCounts[sg.id]||0; if(!cnt)return;

      totalCount+=cnt;

      var cRow=document.createElement('div');
      cRow.style.cssText='display:flex;align-items:center;gap:4px;padding:3px 4px 3px 14px;border-bottom:1px solid #f3f4f6;';
      var cCb=document.createElement('input'); cCb.type='checkbox';
      cCb.style.cssText='width:12px;height:12px;flex-shrink:0;cursor:pointer;';
      cCb.checked=false; cCb.dataset.sub=sg.id;
      var dot=document.createElement('span');
      dot.style.cssText='width:7px;height:7px;border-radius:50%;flex-shrink:0;background:'+(sg.color||'#6b7280')+';';
      var cNm=document.createElement('span');
      cNm.textContent=sg.nm; cNm.style.cssText='font-size:11px;color:#374151;flex:1;';
      var cCnt=document.createElement('span');
      cCnt.textContent=cnt; cCnt.style.cssText='font-size:10px;color:#9ca3af;flex-shrink:0;';
      cRow.appendChild(cCb); cRow.appendChild(dot); cRow.appendChild(cNm); cRow.appendChild(cCnt);

      // Table items under this sub-group
      var tblWrap=document.createElement('div');
      tblWrap.id='tl-tbls-'+sg.id;
      tblWrap.style.display='none';
      var tables=TABLES.filter(function(t){return getSubGroup(t.phys)===sg.id;});
      tables.forEach(function(t){
        var tRow=document.createElement('div');
        tRow.className='tbl-list-item';
        tRow.style.paddingLeft='24px';
        tRow.title=t.phys+' ('+t.logi+')';
        tRow.innerHTML='<span class="tbl-list-logi">'+escH(t.logi)+'</span><span class="tbl-list-phys" style="margin-left:auto;">'+escH(t.phys)+'</span>';
        tRow.addEventListener('click',function(){navigateToTable(t.phys);});
        tblWrap.appendChild(tRow);
      });

      // Sub-group checkbox event
      cCb.addEventListener('change',function(){
        if(this.checked){visibleSubGroups.add(sg.id);}else{visibleSubGroups.delete(sg.id);}
        tblWrap.style.display=this.checked?'':'none';
        var siblings=childWrap.querySelectorAll('input[data-sub]');
        var allC=true,someC=false;
        siblings.forEach(function(s){if(s.checked)someC=true;else allC=false;});
        pCb.checked=allC; pCb.indeterminate=!allC&&someC;
        applyFilters();
        if(this.checked){
          // 체크 시 해당 서브그룹 테이블이 보이도록 자동 스크롤
          var sgTbls=TABLES.filter(function(t){return getSubGroup(t.phys)===sg.id;});
          if(sgTbls.length){
            var minY2=Infinity,maxY2=-Infinity,minX2=Infinity,maxX2=-Infinity;
            sgTbls.forEach(function(t){var p=tablePositions[t.id];if(p){minY2=Math.min(minY2,p.y);maxY2=Math.max(maxY2,p.y+50+t.cols.length*22);minX2=Math.min(minX2,p.x);maxX2=Math.max(maxX2,p.x+320);}});
            if(minY2<Infinity){
              var wrap3=document.getElementById('canvas-wrap');
              var newZ2=Math.max(40,Math.min(120,Math.floor(Math.min(wrap3.clientWidth/(maxX2-minX2+120),wrap3.clientHeight/(maxY2-minY2+120))*100)));
              applyZoom(newZ2);
              setTimeout(function(){
                var wrap4=document.getElementById('canvas-wrap');
                wrap4.scrollLeft=Math.max(0,(minX2-60)*(zoom/100));
                wrap4.scrollTop=Math.max(0,(minY2-60)*(zoom/100));
                drawLines();
              },50);
            }
          }
        } else { drawLines(); }
      });

      // Sub-group row click (not on checkbox) collapses table list
      cRow.addEventListener('click',function(e){
        if(e.target===cCb)return;
        tblWrap.style.display=(tblWrap.style.display==='none')?'':'none';
      });

      childWrap.appendChild(cRow);
      childWrap.appendChild(tblWrap);
    });

    // Parent checkbox event
    pCb.addEventListener('change',function(){
      var chks=childWrap.querySelectorAll('input[data-sub]');
      chks.forEach(function(c){
        c.checked=pCb.checked;
        var sid=c.dataset.sub;
        if(pCb.checked){visibleSubGroups.add(sid);}else{visibleSubGroups.delete(sid);}
        var tw=document.getElementById('tl-tbls-'+sid);
        if(tw) tw.style.display=pCb.checked?'':'none';
      });
      applyFilters(); drawLines();
    });

    // Toggle collapse parent
    toggleSpan.addEventListener('click',function(){
      var collapsed=childWrap.style.display==='none';
      childWrap.style.display=collapsed?'':'none';
      toggleSpan.textContent=collapsed?'▼':'▶';
    });
    pRow.addEventListener('click',function(e){
      if(e.target===pCb||e.target===toggleSpan)return;
      var collapsed=childWrap.style.display==='none';
      childWrap.style.display=collapsed?'':'none';
      toggleSpan.textContent=collapsed?'▼':'▶';
    });

    container.appendChild(pRow);
    container.appendChild(childWrap);
  });

  var cntEl=document.getElementById('tbl-list-cnt');
  if(cntEl)cntEl.textContent=totalCount+'개';
}
function navigateToTable(phys){
  var t=TABLES.find(function(x){return x.phys===phys;});
  if(!t)return;
  var sg=getSubGroup(phys);
  if(!visibleSubGroups.has(sg)){
    visibleSubGroups.add(sg);
    applyFilters();
    // Check the sub-group checkbox in sidebar
    var cb=document.querySelector('input[data-sub="'+sg+'"]');
    if(cb){
      cb.checked=true;
      // Show its table list
      var tw=document.getElementById('tl-tbls-'+sg);
      if(tw) tw.style.display='';
      // Expand parent and update parent checkbox
      var sgDef=SUBGROUP_DEF.find(function(s){return s.id===sg;});
      if(sgDef){
        var cw=document.getElementById('tl-children-'+sgDef.parent);
        if(cw) cw.style.display='';
        var toggle=document.querySelector('span[data-pg="'+sgDef.parent+'"]');
        if(toggle) toggle.textContent='▼';
        var pCb=document.querySelector('input[data-pg="'+sgDef.parent+'"]');
        if(pCb){
          var sibs=cw?cw.querySelectorAll('input[data-sub]'):[];
          var allC=true,someC=false;
          sibs.forEach(function(s){if(s.checked)someC=true;else allC=false;});
          pCb.checked=allC; pCb.indeterminate=!allC&&someC;
        }
      }
    }
    drawLines();
  }
  var pos=tablePositions[t.id];
  if(!pos)return;
  var wrap=document.getElementById('canvas-wrap');
  var tblW=280,tblH=50+t.cols.length*22;
  wrap.scrollLeft=Math.max(0,(pos.x+tblW/2)*(zoom/100)-wrap.clientWidth/2);
  wrap.scrollTop=Math.max(0,(pos.y+tblH/2)*(zoom/100)-wrap.clientHeight/2);
  setTimeout(function(){
    var el=document.getElementById('tbl-'+phys);
    if(!el)return;
    document.querySelectorAll('.erd-tbl').forEach(function(e){e.classList.remove('erd-tbl-highlight');});
    el.classList.add('erd-tbl-highlight');
    setTimeout(function(){el.classList.remove('erd-tbl-highlight');},2000);
  },50);
}
function fitAll(){
  var visible=TABLES.filter(function(t){return visibleSubGroups.has(getSubGroup(t.phys));});
  if(!visible.length) return;
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  visible.forEach(function(t){
    var pos=tablePositions[t.id];
    minX=Math.min(minX,pos.x);minY=Math.min(minY,pos.y);
    maxX=Math.max(maxX,pos.x+320);maxY=Math.max(maxY,pos.y+50+t.cols.length*22);
  });
  var wrap=document.getElementById('canvas-wrap');
  var newZ=Math.floor(Math.min(wrap.clientWidth/(maxX-minX+100),wrap.clientHeight/(maxY-minY+100))*100);
  applyZoom(Math.max(20,Math.min(150,newZ)));
  setTimeout(function(){
    var wrap2=document.getElementById('canvas-wrap');
    wrap2.scrollLeft=(minX-50)*(zoom/100);
    wrap2.scrollTop=(minY-50)*(zoom/100);
    drawLines();
  },50);
}
function relayoutBySubGroup(){
  var TBL_W=300,GAP_X=28,SUB_GAP=50,MAP_GAP=24,PG_GAP=80,START_X=60,START_Y=60;
  // mapping table → appears just before this sub-group
  var BEFORE_SG={
    "wms-inwh":   ["wms_inbiz_inwh"],
    "wms-outwh":  ["wms_outbiz_outwh"],
    "wms-invoice":["wms_outbiz_invoice"],
    "wms-load":   ["wms_outbiz_load"]
  };
  function sortTbls(arr){arr.sort(function(a,b){return a.phys.length-b.phys.length||a.phys.localeCompare(b.phys);});}
  function placeRow(tbls){
    var curX=START_X,rowH=0;
    tbls.forEach(function(t){
      var h=50+t.cols.length*22;
      tablePositions[t.id]={x:curX,y:curY};
      rowH=Math.max(rowH,h); curX+=TBL_W+GAP_X;
    });
    return rowH;
  }
  var parentOrder=["wms","mdm","sm","sif","wes"];
  var curY=START_Y;
  parentOrder.forEach(function(pg){
    var subs=SUBGROUP_DEF.filter(function(s){return s.parent===pg;});
    if(!subs.length)return;
    var pgHasTables=subs.some(function(sg){return TABLES.some(function(t){return getSubGroup(t.phys)===sg.id;});});
    if(!pgHasTables)return;
    subs.forEach(function(sg){
      // 1. Connector row BEFORE this sub-group (mapping tables connecting FROM prev group TO this group)
      var connPhys=BEFORE_SG[sg.id]||[];
      var connTbls=connPhys.map(function(p){return TABLES.find(function(t){return t.phys===p;});}).filter(Boolean);
      if(connTbls.length){
        sortTbls(connTbls);
        curY+=placeRow(connTbls)+MAP_GAP;
      }
      // 2. Main tables of this sub-group (skip MAPPING_TBLS — they are handled by BEFORE_SG)
      var mainTbls=TABLES.filter(function(t){return getSubGroup(t.phys)===sg.id&&!MAPPING_TBLS.has(t.phys);});
      if(!mainTbls.length)return;
      sortTbls(mainTbls);
      curY+=placeRow(mainTbls)+SUB_GAP;
    });
    curY+=PG_GAP;
  });
  // 동적 리사이즈: 실제 최대 Y에 맞게 canvas/SVG 확장
  var maxBottom=0;
  TABLES.forEach(function(t){
    var pos=tablePositions[t.id];
    if(pos){var h=50+t.cols.length*22;if(pos.y+h>maxBottom)maxBottom=pos.y+h;}
  });
  var newH=maxBottom+200;
  var cvs=document.getElementById('canvas');
  var svg=document.getElementById('svg-layer');
  if(cvs){cvs.style.height=newH+'px';}
  if(svg){svg.setAttribute('height',newH+'px');}
}
function resetLayout(){
  relayoutBySubGroup();
  renderTables();
  applyZoom(60);
  setTimeout(function(){applyFilters();drawLines();},100);
}
function buildGroupFilter(){
  var container=document.getElementById('grp-filter-container');
  if(!container)return;
  var subCounts={};
  TABLES.forEach(function(t){var s=getSubGroup(t.phys);subCounts[s]=(subCounts[s]||0)+1;});
  var parentOrder=['wms','mdm','sm','sif','wes'];
  parentOrder.forEach(function(pg){
    var pgDef=PARENT_GROUPS[pg];if(!pgDef)return;
    var children=SUBGROUP_DEF.filter(function(s){return s.parent===pg&&(subCounts[s.id]||0)>0;});
    if(!children.length)return;
    var parentCnt=children.reduce(function(sum,s){return sum+(subCounts[s.id]||0);},0);
    var div=document.createElement('div');div.className='grp-parent';
    var allChecked=children.every(function(s){return visibleSubGroups.has(s.id);});
    var childRows=children.map(function(s){
      var cnt=subCounts[s.id]||0;
      return '<div class="grp-child-row"><input type="checkbox" class="sub-cb" data-sub="'+s.id+'"'+(visibleSubGroups.has(s.id)?' checked':'')+'><span class="sub-nm">'+s.nm+'</span><span class="sub-cnt">'+cnt+'</span></div>';
    }).join('');
    div.innerHTML='<div class="grp-parent-row"><span class="grp-toggle" data-pg="'+pg+'">▼</span><input type="checkbox" class="parent-cb" data-pg="'+pg+'"'+(allChecked?' checked':'')+'><span class="grp-badge '+pgDef.badge+'">'+pg.toUpperCase()+'</span><span class="grp-parent-nm">'+pgDef.nm+'</span><span class="grp-parent-cnt">'+parentCnt+'</span></div><div class="grp-children" id="gc-'+pg+'">'+childRows+'</div>';
    container.appendChild(div);
  });
  container.querySelectorAll('.grp-toggle').forEach(function(btn){
    btn.addEventListener('click',function(){
      var pg=this.dataset.pg;var ch=document.getElementById('gc-'+pg);
      var collapsed=ch.style.display==='none';ch.style.display=collapsed?'':'none';this.textContent=collapsed?'▼':'▶';
    });
  });
  container.querySelectorAll('.parent-cb').forEach(function(cb){
    cb.addEventListener('change',function(){
      var pg=this.dataset.pg;var checked=this.checked;
      container.querySelectorAll('.sub-cb').forEach(function(s){
        if(s.dataset.sub===pg||s.dataset.sub.startsWith(pg+'-')){s.checked=checked;if(checked)visibleSubGroups.add(s.dataset.sub);else visibleSubGroups.delete(s.dataset.sub);}
      });
      applyFilters();
    });
  });
  container.querySelectorAll('.sub-cb').forEach(function(cb){
    cb.addEventListener('change',function(){
      var sub=this.dataset.sub;if(this.checked)visibleSubGroups.add(sub);else visibleSubGroups.delete(sub);
      var pgDef=SUBGROUP_DEF.find(function(s){return s.id===sub;});
      if(pgDef){
        var siblings=container.querySelectorAll('.sub-cb');
        var allOn=true;
        siblings.forEach(function(s){if((s.dataset.sub===pgDef.parent||s.dataset.sub.startsWith(pgDef.parent+'-'))&&!s.checked)allOn=false;});
        var parentCb=container.querySelector('.parent-cb[data-pg="'+pgDef.parent+'"]');
        if(parentCb)parentCb.checked=allOn;
      }
      applyFilters();
    });
  });
}
function applyFilters(){
  var term=searchTerm.toLowerCase();
  TABLES.forEach(function(t){
    var el=document.getElementById('tbl-'+t.id);
    if(!el) return;
    var grpOk=visibleSubGroups.has(getSubGroup(t.phys));
    var srchOk=!term||t.phys.toLowerCase().indexOf(term)>=0||t.logi.toLowerCase().indexOf(term)>=0;
    if(grpOk&&srchOk) el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
  updateStats();
  drawLines();
}
document.getElementById('search-input').addEventListener('input',function(){
  searchTerm=this.value;
  applyFilters();
  if(searchTerm){
    var term=searchTerm.toLowerCase();
    var found=TABLES.find(function(t){return visibleSubGroups.has(getSubGroup(t.phys))&&(t.phys.toLowerCase().indexOf(term)>=0||t.logi.toLowerCase().indexOf(term)>=0);});
    if(found){
      var pos=tablePositions[found.id];
      var wrap=document.getElementById('canvas-wrap');
      setTimeout(function(){
        wrap.scrollLeft=(pos.x+160)*(zoom/100)-wrap.clientWidth/2;
        wrap.scrollTop=(pos.y+50)*(zoom/100)-wrap.clientHeight/2;
      },50);
    }
  }
});
function updateStats(){
  var vis=TABLES.filter(function(t){var el=document.getElementById('tbl-'+t.id);return el&&!el.classList.contains('hidden');}).length;
  var totalCols=TABLES.reduce(function(s,t){return s+t.cols.length;},0);
  document.getElementById('stat-tbl').textContent=TABLES.length;
  document.getElementById('stat-col').textContent=totalCols;
  document.getElementById('stat-fk').textContent=FKS.length;
  document.getElementById('stat-vis').textContent=vis;
}
