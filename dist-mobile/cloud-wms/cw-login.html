<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>로그인 / 회원가입 - Cloud WMS</title>
<link rel="stylesheet" href="../mobile.css">
<style>
.step-nav{display:flex;align-items:center;justify-content:space-between;background:#1c2333;color:#fff;padding:6px 14px;font-size:12px;flex-shrink:0;}
.step-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;}
.step-screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.step-screen.active{display:flex;}

/* Login screen styles */
.login-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:40px 32px 32px;background:#fff;overflow-y:auto;
}
.login-logo{text-align:center;margin-bottom:60px;}
.logo-cloud{font-size:52px;line-height:1;}
.logo-text{display:flex;align-items:baseline;gap:0;justify-content:center;margin-top:-4px;}
.logo-cwms{font-size:38px;font-weight:700;color:#00afec;font-style:italic;letter-spacing:-1px;}
.logo-cloud-text{font-size:26px;font-weight:600;color:#555;letter-spacing:2px;}
.login-form{width:100%;max-width:360px;}
.login-input{
  width:100%;height:52px;padding:0 16px;
  border:1.5px solid #d1d5db;border-radius:8px;
  font-size:15px;color:#111827;background:#fff;
  margin-bottom:14px;box-sizing:border-box;
  outline:none;
}
.login-input:focus{border-color:#00afec;box-shadow:0 0 0 2px rgba(0,175,236,0.12);}
.login-input::placeholder{color:#9ca3af;}
.login-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.login-chk{display:flex;align-items:center;gap:8px;font-size:14px;color:#374151;cursor:pointer;}
.login-chk input[type=checkbox]{width:18px;height:18px;accent-color:#00afec;cursor:pointer;}
.login-link{font-size:14px;color:#00afec;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;}
.login-btn{
  width:100%;height:52px;background:#2196f3;border:none;border-radius:8px;
  color:#fff;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:32px;
}
.login-btn:hover{background:#1976d2;}
.login-main-link{text-align:center;}
.login-main-link a{font-size:14px;color:#374151;text-decoration:underline;cursor:pointer;}

/* Terms screen (step 2) */
.terms-wrap{flex:1;overflow-y:auto;padding:20px 20px 0;}
.terms-item{margin-bottom:18px;}
.terms-chk-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;}
.terms-chk-row input[type=checkbox]{width:20px;height:20px;accent-color:#00afec;cursor:pointer;flex-shrink:0;}
.terms-chk-label{font-size:15px;color:#111827;font-weight:500;}
.terms-box{
  background:#f3f4f6;border-radius:6px;padding:12px 14px;
  font-size:13px;color:#6b7280;line-height:1.6;min-height:80px;
}
.terms-all-row{display:flex;align-items:center;gap:10px;padding:14px 0 18px;cursor:pointer;border-top:1px solid #e5e7eb;margin-top:4px;}
.terms-all-row input[type=checkbox]{width:20px;height:20px;accent-color:#00afec;cursor:pointer;flex-shrink:0;}
.terms-all-label{font-size:15px;color:#111827;font-weight:600;}
.terms-next-btn{
  flex-shrink:0;margin:0 20px 20px;height:52px;background:#2196f3;border:none;border-radius:8px;
  color:#fff;font-size:18px;font-weight:600;cursor:pointer;width:calc(100% - 40px);
}
.terms-next-btn:hover{background:#1976d2;}

/* Register screen (step 3) */
.register-wrap{flex:1;overflow-y:auto;padding:20px 20px 20px;}
.reg-desc{font-size:14px;color:#374151;margin-bottom:16px;line-height:1.5;}
.reg-email-row{display:flex;gap:10px;margin-bottom:4px;}
.reg-email-input{
  flex:1;height:48px;padding:0 14px;border:1.5px solid #d1d5db;border-radius:8px;
  font-size:14px;color:#111827;background:#fff;outline:none;
}
.reg-email-input:focus{border-color:#00afec;}
.reg-email-input::placeholder{color:#9ca3af;}
.reg-send-btn{
  width:80px;height:48px;background:#2196f3;border:none;border-radius:8px;
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0;
}
.reg-field{
  width:100%;height:48px;padding:0 14px;border:1.5px solid #d1d5db;border-radius:8px;
  font-size:14px;color:#111827;background:#fff;outline:none;
  margin-bottom:0;box-sizing:border-box;
}
.reg-field:focus{border-color:#00afec;}
.reg-field::placeholder{color:#9ca3af;}
.reg-note{font-size:13px;color:#374151;margin:6px 0 2px;}
.reg-warn{font-size:13px;color:#e53e3e;line-height:1.5;margin-bottom:14px;}
.reg-label{font-size:14px;font-weight:600;color:#111827;margin:14px 0 6px;}
.reg-submit-btn{
  width:100%;height:52px;background:#2196f3;border:none;border-radius:8px;
  color:#fff;font-size:18px;font-weight:600;cursor:pointer;margin-top:18px;
}
.reg-submit-btn:hover{background:#1976d2;}
.reg-field-wrap{margin-bottom:10px;}

/* Logo SVG-like CSS art */
.cwms-logo-wrap{
  display:flex;flex-direction:column;align-items:center;margin-bottom:52px;
}
.cwms-logo-icon{
  width:110px;height:72px;position:relative;margin-bottom:2px;
}

/* Generic page header (steps 2,3) */
.mobile-header{
  display:flex;align-items:center;height:54px;background:#fff;
  border-bottom:1.5px solid #e8eaed;flex-shrink:0;padding:0 14px;position:relative;
}
.mobile-header .back-btn{
  font-size:26px;color:#555;cursor:pointer;background:none;border:none;padding:0;
  line-height:1;
}
.mobile-header .header-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:17px;font-weight:600;color:#111827;
}
.divider{height:1px;background:#e8eaed;flex-shrink:0;}
</style>
</head>
<body>
<div class="pda-wrap">
  <!-- Step Navigator -->
  <div class="step-nav">
    <button onclick="prevStep()">&#8249; 이전</button>
    <span id="si">화면 1/4</span>
    <button onclick="nextStep()">다음 &#8250;</button>
  </div>

  <!-- ============================

  <div class="step-screen active">

          <ellipse cx="68" cy="48" rx="34" ry="28" fill="#00afec"/>

    <!-- 하단 탭바 -->

      <a href="./cw-inbound-a.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#128230;</span>입고</a>
      <a href="./cw-main.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#00afec;gap:2px;text-decoration:none;"><span style="font-size:22px;">&#9729;</span>메인화면</a>
      <a href="./cw-outbound.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#128666;</span>출고</a>
      <a href="./cw-inv-move-a.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#x1F504;</span>재고이동</a>
    </nav>

  <!-- ============================
       Step 2: 회원가입 - 약관동의
       ============================ -->
  <div class="step-screen">
    <!-- 헤더 -->
    <div class="mobile-header">
      <button class="back-btn" onclick="prevStep()">&#8592;</button>
      <span class="header-title">회원약관 동의</span>
    </div>
    <div class="divider"></div>

    <!-- 약관 내용 -->
    <div class="terms-wrap">
      <!-- 만 14세 이상 -->
      <div class="terms-item">
        <label class="terms-chk-row">
          <input type="checkbox" checked id="chk-age" />
          <span class="terms-chk-label">만 14세 이상입니다. (필수)</span>
        </label>
      </div>

      <!-- 서비스이용약관 -->
      <div class="terms-item">
        <label class="terms-chk-row">
          <input type="checkbox" checked id="chk-service" />
          <span class="terms-chk-label">서비스이용약관(필수)</span>
        </label>
        <div class="terms-box">
          이용약관 내용<br><br><br>
        </div>
      </div>

      <!-- 개인정보처리방침 -->
      <div class="terms-item">
        <label class="terms-chk-row">
          <input type="checkbox" checked id="chk-privacy" />
          <span class="terms-chk-label">개인정보처리방침(필수)</span>
        </label>
        <div class="terms-box">
          개인정보처리방침 내용<br><br><br>
        </div>
      </div>

      <!-- 서비스 이용정보 알림 -->
      <div class="terms-item">
        <label class="terms-chk-row">
          <input type="checkbox" checked id="chk-notify" />
          <span class="terms-chk-label">서비스 이용정보 알림(선택)</span>
        </label>
        <div class="terms-box">
          서비스 이용정보 내용<br><br><br>
        </div>
      </div>

      <!-- 전체 동의 -->
      <label class="terms-all-row" id="all-agree-row">
        <input type="checkbox" checked id="chk-all" onchange="toggleAll(this)" />
        <span class="terms-all-label">전체 동의</span>
      </label>
    </div>

    <!-- 다음 버튼 -->
    <button class="terms-next-btn" onclick="nextStep()">다음</button>

    <!-- 탭바 -->
    <nav style="display:flex;justify-content:space-around;align-items:center;height:54px;background:#fff;border-top:1.5px solid #e8eaed;flex-shrink:0;padding:0 4px;">

      <a href="./cw-inbound-a.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#128230;</span>입고</a>
      <a href="./cw-main.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#00afec;gap:2px;text-decoration:none;"><span style="font-size:22px;">&#9729;</span>메인화면</a>
      <a href="./cw-outbound.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#128666;</span>출고</a>
      <a href="./cw-inv-move-a.html" style="display:flex;flex-direction:column;align-items:center;font-size:10px;color:#9ca3af;gap:2px;text-decoration:none;"><span style="font-size:20px;">&#x1F504;</span>재고이동</a>
    </nav>
  </div>

  <!-- ============================
       Step 3: 회원가입 - 인증 / 정보입력
       ============================ -->
  <div class="step-screen">
    <!-- 헤더 -->
    <div class="mobile-header">
      <button class="back-btn" onclick="prevStep()">&#8592;</button>
      <span class="header-title">회원가입</span>
    </div>
    <div class="divider"></div>

    <!-- 등록 폼 -->
    <div class="register-wrap">
      <p class="reg-desc">메일로 발송된 사업장코드를 입력하세요.</p>

      <!-- 이메일 + 발송 -->
      <div class="reg-email-row">
        <input class="reg-email-input" type="email" value="abc@gmail.com" />
        <button class="reg-send-btn" onclick="alert('인증코드를 발송했습니다.')">발송</button>
      </div>

      <!-- 사업장코드 입력 -->
      <div class="reg-field-wrap" style="margin-top:10px;">
        <input class="reg-field" type="text" placeholder="사업장코드입력" />
      </div>
      <p class="reg-note">코드는 3분간 유효합니다.</p>
      <p class="reg-warn">사업장코드는 로그인시 입력이 필요하므로<br>별도로 관리하시기 바랍니다.</p>

      <!-- ID -->
      <p class="reg-label">ID</p>
      <div class="reg-field-wrap">
        <input class="reg-field" type="text" placeholder="아이디를 입력하세요." />
      </div>

      <!-- 관리자명 -->
      <p class="reg-label">관리자명</p>
      <div class="reg-field-wrap">
        <input class="reg-field" type="text" placeholder="이름을 입력하세요." />
      </div>

      <!-- PASSWORD -->
      <p class="reg-label">PASSWORD</p>
      <div class="reg-field-wrap">
        <input class="reg-field" type="password" placeholder="패스워드 입력하세요." />
      </div>
      <div class="reg-field-wrap">
        <input class="reg-field" type="password" placeholder="패스워드 재입력하세요." />
      </div>

      <!-- 가입완료 -->
      <button class="reg-submit-btn" onclick="alert('가입이 완료되었습니다.')">가입완료</button>
    </div>

    <!-- 탭바 -->
    <nav style="display:flex;justify-content:space-around;align-items:center;height:54px;background:#fff;border-top:1.5px solid #e8eaed;flex-shrink:0;padding:0 4px;">

       ============================ -->

      <!-- CWMS CLOUD Logo -->

        <svg width="200" height="90" viewBox="0 0 200 90" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:2px;">

        <div class="login-options">
          <label class="login-chk">

          <button class="login-link" onclick="showStep(1)">회원가입</button>
        </div>
        <button class="login-btn" style="box-shadow:0 0 0 4px rgba(33,150,243,0.28);" onclick="alert('로그인')">로그인</button>
        <div class="login-main-link">
          <a href="./cw-main.html">메인페이지로 이동하기</a>
        </div>
      </div>
    </main>
    <!-- 하단 탭바 -->
    <nav style="display:flex;justify-content:space-around;align-items:center;height:54px;background:#fff;border-top:1.5px solid #e8eaed;flex-shrink:0;padding:0 4px;">

<script>
var cur=0;
var ss=document.querySelectorAll(".step-screen");
function showStep(n){
  ss[cur].classList.remove("active");
  cur=Math.max(0,Math.min(ss.length-1,n));
  ss[cur].classList.add("active");
  document.getElementById("si").textContent="화면 "+(cur+1)+"/"+ss.length;
}
function prevStep(){showStep(cur-1);}
function nextStep(){showStep(cur+1);}

function toggleAll(el){
  var checked=el.checked;
  document.getElementById("chk-age").checked=checked;
  document.getElementById("chk-service").checked=checked;
  document.getElementById("chk-privacy").checked=checked;
  document.getElementById("chk-notify").checked=checked;
}
</script>
