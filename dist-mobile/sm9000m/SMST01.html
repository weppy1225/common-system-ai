<!--
  wireframe-only | SMST01 | 설정 | Type F (설정형) | sm9000m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 [SMST01]</title>
<link rel="stylesheet" href="../mobile.css">
<style>
.settings-wrap{flex:1;overflow-y:auto;padding:0 0 8px}
.setting-group-hdr{
  font-size:11px;font-weight:700;color:#b8bdc6;letter-spacing:.8px;text-transform:uppercase;
  padding:20px 16px 8px;
}
.setting-account-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;margin:0 12px 8px;
  border-radius:14px;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
}
.setting-user-name{font-size:20px;font-weight:700;color:#00afec}
.setting-logout-btn{
  height:34px;padding:0 16px;
  background:#fff;border:1.5px solid #e8eaed;
  border-radius:20px;font-size:13px;font-weight:500;
  color:#6b7280;cursor:pointer;font-family:inherit;
  transition:border-color .1s,color .1s;
}
.setting-logout-btn:active{border-color:#00afec;color:#00afec}
.setting-nav-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:17px 16px;margin:0 12px 8px;
  border-radius:14px;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
  cursor:pointer;transition:transform .1s;
}
.setting-nav-item:active{transform:scale(.98)}
.setting-nav-label{font-size:16px;font-weight:600;color:#1c2333}
.setting-nav-arrow{font-size:20px;color:#d1d5db;font-weight:300}
</style>
</head>
<body>
<div class="pda-wrap">

  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">설정</div>
    <div class="header-right"></div>
  </header>

  <div class="settings-wrap">
    <!-- 계정정보 섹션 -->
    <div class="setting-group-hdr">계정정보</div>
    <div class="setting-account-row">
      <span class="setting-user-name">테스트01</span>
      <button class="setting-logout-btn" onclick="if(confirm('로그아웃 하시겠습니까?')){alert('로그아웃 되었습니다.');}">로그아웃</button>
    </div>
    <div class="setting-nav-item" onclick="alert('[개인정보설정]\n개인정보 설정 화면으로 이동합니다.')">
      <span class="setting-nav-label">개인정보설정</span>
      <span class="setting-nav-arrow">›</span>
    </div>

    <!-- 알람 섹션 -->
    <div class="setting-group-hdr" style="margin-top:8px">알람</div>
    <div class="setting-nav-item" onclick="alert('[알람설정]\n알람 설정 화면으로 이동합니다.')">
      <span class="setting-nav-label">알람설정</span>
      <span class="setting-nav-arrow">›</span>
    </div>
  </div>

  <nav class="tab-bar">
    <button class="tab-item" onclick="location.href='../main.html'">
      <img src="../assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item" onclick="location.href='../iv3000m/IVMV01.html'">
      <img src="../assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item" onclick="location.href='../ow5000m/OWRQ01.html'">
      <img src="../assets/icon-footer01.png" alt="피킹">
    </button>
    <button class="tab-item" onclick="location.href='../iv3200m/STRG01.html'">
      <img src="../assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item on" onclick="location.href='../menu.html'">
      <img src="../assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>
</body>
</html>
