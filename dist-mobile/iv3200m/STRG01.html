<!--
  wireframe-only | STRG01 | 재고이동 | Type C (탭형) | iv3200m
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고이동 [STRG01]</title>
<link rel="stylesheet" href="../mobile.css">
<style>
.loc-card{
  margin:8px 12px;border-radius:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
  padding:14px 16px;cursor:pointer;
  transition:transform .12s,box-shadow .12s;background:#fff;
}
.loc-card:active{transform:scale(.985);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.loc-code{font-size:11px;color:#b8bdc6;margin-bottom:3px;letter-spacing:.3px}
.loc-name{font-size:16px;font-weight:700;color:#1c2333;margin-bottom:6px}
.loc-meta{display:flex;gap:12px;font-size:13px;color:#9ca3af}
.loc-stock{color:#00afec;font-weight:700}
.prod-card{
  margin:8px 12px;border-radius:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
  padding:14px 16px;cursor:pointer;
  transition:transform .12s,box-shadow .12s;background:#fff;
}
.prod-card:active{transform:scale(.985);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.prod-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.prod-stock-badge{background:#e0f7fe;color:#0369a1;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}
.move-form{padding:14px 16px;flex-shrink:0;border-top:1px solid #f0f2f5;background:#f8fafc}
.move-form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.move-label{font-size:13px;color:#9ca3af;width:52px;flex-shrink:0;font-weight:500}
</style>
</head>
<body>
<div class="pda-wrap">

  <header class="pda-header">
    <div class="header-spacer"></div>
    <div class="header-title">재고이동</div>
    <div class="header-right">
      <button class="header-btn" onclick="alert('[이동이력]\n재고이동 이력을 조회합니다.')">📋</button>
    </div>
  </header>

  <!-- 화면 내 탭 -->
  <div class="scr-tabs">
    <button class="scr-tab on" id="tab-prod" onclick="switchTab('prod')">품목이동</button>
    <button class="scr-tab"    id="tab-loc"  onclick="switchTab('loc')">위치스캔</button>
  </div>

  <!-- 검색 -->
  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-ico"><img src="../assets/icon-search.png" alt="검색"></span>
      <input type="text" id="searchInput" placeholder="품목코드/위치코드 스캔 및 입력" oninput="renderTab()">
      <button class="search-act-btn" onclick="alert('[스캔]\n바코드를 스캔합니다.')"><img src="../assets/icon-schBarcode.png" alt="바코드"></button>
    </div>
  </div>

  <!-- 탭 콘텐츠 -->
  <main class="pda-content">
    <div id="tabContent"></div>
  </main>

  <!-- 이동 입력 폼 (품목이동 탭) -->
  <div class="move-form" id="moveForm" style="display:none">
    <div class="move-form-row">
      <span class="move-label">선택품목</span>
      <span style="font-size:14px;font-weight:700;color:#000;flex:1" id="selProdName">-</span>
    </div>
    <div class="move-form-row">
      <span class="move-label">이동수량</span>
      <input type="number" class="pda-inp" id="moveQty" placeholder="0" min="0" style="width:80px;text-align:right">
      <span style="font-size:14px;color:#555" id="moveUnit">EA</span>
    </div>
    <div class="move-form-row">
      <span class="move-label">이동위치</span>
      <input type="text" class="pda-inp" id="moveLoc" placeholder="위치코드 스캔" style="flex:1">
      <button class="search-act-btn" onclick="alert('[스캔]\n이동할 위치 바코드를 스캔합니다.')">▦</button>
    </div>
  </div>

  <!-- 이동처리 버튼: 품목 선택 시만 표시 -->
  <div class="footer-cta" id="moveCta" style="display:none">
    <button class="pda-btn btn-gray" onclick="cancelMove()">취소</button>
    <button class="pda-btn btn-blue" onclick="doMove()">이동처리</button>
  </div>

  <!-- 하단 탭바 -->
  <nav class="tab-bar" id="mainTabBar">
    <button class="tab-item" onclick="location.href='../main.html'">
      <img src="../assets/icon-footerLogo.png" alt="메인화면">
    </button>
    <button class="tab-item" onclick="location.href='../iv3000m/IVMV01.html'">
      <img src="../assets/icon-footer02.png" alt="입고">
    </button>
    <button class="tab-item" onclick="location.href='../ow5000m/OWRQ01.html'">
      <img src="../assets/icon-footer01.png" alt="피킹">
    </button>
    <button class="tab-item on">
      <img src="../assets/icon-footer03.png" alt="재고이동">
    </button>
    <button class="tab-item" onclick="location.href='../menu.html'">
      <img src="../assets/icon-mobileMenu.png" alt="메뉴">
    </button>
  </nav>
</div>

<script src="./STRG01-data.js"></script>
<script>
var activeTab='prod';
var selProd=null;

function switchTab(t) {
  activeTab=t;
  ['prod','loc'].forEach(function(id){
    document.getElementById('tab-'+id).classList.toggle('on',id===t);
  });
  document.getElementById('moveForm').style.display=(t==='prod'&&selProd)?'block':'none';
  renderTab();
}

function renderTab() {
  var q=document.getElementById('searchInput').value.toLowerCase();
  var html='';
  if (activeTab==='prod') {
    var data=STRG01_DATA.products.filter(function(d){return !q||d.code.includes(q)||d.name.includes(q);});
    if(!data.length){html='<div class="empty-msg">품목이 없습니다.</div>';}
    else data.forEach(function(d){
      var sel=selProd&&selProd.code===d.code;
      html+='<div class="prod-card" onclick="selectProd(\''+d.code+'\')" style="'+(sel?'border-color:#00afec;background:#F0FBFF':'')+'">'
        +'<div class="loc-code">'+d.code+'</div>'
        +'<div class="loc-name">'+d.name+'</div>'
        +'<div class="prod-meta"><span class="loc-meta">위치: '+d.fromLoc+' · 단위: '+d.unit+'</span><span class="prod-stock-badge">재고 '+d.stock+'</span></div>'
        +'</div>';
    });
  } else {
    var data=STRG01_DATA.locations.filter(function(d){return !q||d.code.includes(q)||d.wh.includes(q);});
    if(!data.length){html='<div class="empty-msg">위치가 없습니다.</div>';}
    else data.forEach(function(d){
      html+='<div class="loc-card" onclick="selectLoc(\''+d.code+'\')">'
        +'<div class="loc-code">'+d.code+'</div>'
        +'<div class="loc-name">'+d.wh+'</div>'
        +'<div class="loc-meta"><span>랙: '+d.rack+'</span><span>단: '+d.lv+'</span><span>열: '+d.col+'</span><span class="loc-stock">재고 '+d.stock+'</span></div>'
        +'</div>';
    });
  }
  document.getElementById('tabContent').innerHTML=html;
}

function selectProd(code){
  selProd=STRG01_DATA.products.find(function(d){return d.code===code;});
  document.getElementById('selProdName').textContent=selProd.name;
  document.getElementById('moveUnit').textContent=selProd.unit;
  document.getElementById('moveForm').style.display='block';
  document.getElementById('moveCta').style.display='flex';
  document.getElementById('mainTabBar').style.display='none';
  renderTab();
}

function selectLoc(code){
  var loc=STRG01_DATA.locations.find(function(d){return d.code===code;});
  if(confirm('['+code+']\n이 위치로 재고를 이동하시겠습니까?')){
    alert('['+code+']\n위치 스캔이 완료되었습니다.\n재고이동 처리를 진행하세요.');
  }
}

function cancelMove(){selProd=null;document.getElementById('moveForm').style.display='none';document.getElementById('moveCta').style.display='none';document.getElementById('mainTabBar').style.display='flex';renderTab();}

function doMove(){
  if(!selProd){alert('품목을 선택하세요.');return;}
  var qty=parseInt(document.getElementById('moveQty').value)||0;
  var loc=document.getElementById('moveLoc').value.trim();
  if(!qty){alert('이동수량을 입력하세요.');return;}
  if(!loc){alert('이동위치를 입력하세요.');return;}
  if(confirm('['+selProd.name+']\n수량: '+qty+' '+selProd.unit+'\n→ 위치: '+loc+'\n\n이동처리 하시겠습니까?')){
    alert('재고이동이 완료되었습니다.');
    document.getElementById('moveQty').value='';
    document.getElementById('moveLoc').value='';
    cancelMove();
  }
}

window.addEventListener('DOMContentLoaded',function(){renderTab();});
</script>
</body>
</html>
